{% extends 'base.html' %}

{% block title %}Logged Out - Health Prediction{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm border-top border-secondary border-4 text-center">
            <div class="card-body p-5">
                <div class="text-success mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>

                <h3 class="card-title fw-bold text-dark mb-2">Securely Logged Out</h3>
                <p class="text-muted mb-4">You have successfully ended your health session. Your medical records are protected.</p>
                
                <hr class="my-4 text-muted opacity-25">

                <div class="d-grid gap-2">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg fs-6 fw-semibold shadow-sm">
                        Sign Back In
                    </a>
                    <a href="/" class="btn btn-light btn-lg border fs-6">
                        Return Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
